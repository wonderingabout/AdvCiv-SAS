name: Refresh AIP predump cache

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-aip-predump-cache-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  refresh-aip-predump-cache:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Refresh AIP predump cache
        shell: bash
        run: |
          # <!-- custom: Manual-only bot helper: rebuild the committed AIP predump with the same deterministic writer used locally. A following diff step decides whether there is anything worth proposing as a PR. (GPT-5.5) -->
          python .github/workflows/build/aip_predump_values.py --write
          python .github/workflows/build/aip_predump_values.py
      - name: Check for predump diff
        id: predump-diff
        shell: bash
        run: |
          predump_path="Assets/Python/Contrib/Sevopedia/SevoPediaLeaderCachePredumped.py"
          if git diff --quiet -- "$predump_path"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "AIP predump cache is already current; no PR needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "AIP predump cache changed; PR will be created or updated."
            git diff -- "$predump_path"
          fi
      - name: Create or update predump refresh PR
        if: steps.predump-diff.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          predump_path="Assets/Python/Contrib/Sevopedia/SevoPediaLeaderCachePredumped.py"
          safe_base_branch="$(printf '%s' "$BASE_BRANCH" | tr -c 'A-Za-z0-9._-' '-')"
          bot_branch="bot/refresh-aip-predump-cache-${safe_base_branch}"
          pr_body_path="$RUNNER_TEMP/aip-predump-refresh-pr-body.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$bot_branch"
          git add "$predump_path"
          git commit -m "Refresh AIP predump cache"
          git fetch origin "+refs/heads/$bot_branch:refs/remotes/origin/$bot_branch" || true
          git push --force-with-lease --set-upstream origin "$bot_branch"

          cat > "$pr_body_path" <<'EOF_PR_BODY'
          Automated refresh of `SevoPediaLeaderCachePredumped.py`.

          This PR was created by the manual **Refresh AIP predump cache** workflow. It runs:

          ```bash
          python .github/workflows/build/aip_predump_values.py --write
          python .github/workflows/build/aip_predump_values.py
          ```

          Review the predump diff before merging.
          EOF_PR_BODY

          existing_pr_url="$(gh pr list --head "$bot_branch" --base "$BASE_BRANCH" --state open --json url --jq '.[0].url')"
          if [ -n "$existing_pr_url" ]; then
            gh pr edit "$existing_pr_url" --title "Refresh AIP predump cache" --body-file "$pr_body_path"
            echo "Updated existing PR: $existing_pr_url"
          else
            gh pr create --base "$BASE_BRANCH" --head "$bot_branch" --title "Refresh AIP predump cache" --body-file "$pr_body_path"
          fi
